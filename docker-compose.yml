services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - chroma_data:/app/chroma_store
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag_ui
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - .:/app
    command: python app/ui/ui_gradio.py
    depends_on:
      - backend

volumes:
  chroma_data: